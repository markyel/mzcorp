server {
    listen 80;
    listen [::]:80;
    server_name mzcorp.ru www.mzcorp.ru;

    root /var/www/mzcorp/public;
    index index.php;

    charset utf-8;
    client_max_body_size 50M;

    access_log /var/log/nginx/mzcorp.access.log;
    error_log  /var/log/nginx/mzcorp.error.log;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location / {
        # $uri/ намеренно убран: физические директории в public/
        # (например public/docs/screenshots/) перекрывали Laravel-роуты
        # вроде /docs и отдавали 403 (autoindex off, нет index-файла).
        # Файлы внутри директорий всё ещё резолвятся через $uri.
        try_files $uri /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120s;
    }

    error_page 404 /index.php;
}
