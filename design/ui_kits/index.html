<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>MyLift CRM · Design System Overview</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#0e1014;font-family:var(--font-sans);color:#fff}
  .iframe-wrap{width:100%;height:100%;border:0;display:block;background:var(--bg-app)}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useEffect, useState } = React;

// Helper to embed any of our preview/UI files as an iframe inside an artboard
function Frame({ src, w, h }) {
  return (
    <iframe
      src={src}
      className="iframe-wrap"
      style={{ width: w, height: h, border: 0, display: 'block', background: 'var(--bg-app)' }}
      loading="lazy"
    />
  );
}

function App() {
  return (
    <DesignCanvas
      title="MyLift CRM · Design System"
      subtitle="Foundations, components, and full screens for the internal request-management tool of Мой ЗиП / mylift.ru"
    >
      <DCSection id="foundations" title="01 · Foundations" subtitle="Brand, palette, type, spacing — the tokens every screen draws from.">
        <DCArtboard id="logo" label="Logo · CRM wordmark + corporate" width={700} height={280}>
          <Frame src="../preview/logos.html" w={700} h={280} />
        </DCArtboard>
        <DCArtboard id="colors" label="Colour · brand red, neutral scale, status hues" width={700} height={320}>
          <Frame src="../preview/colors.html" w={700} h={320} />
        </DCArtboard>
        <DCArtboard id="type" label="Type · Inter + JetBrains Mono" width={700} height={360}>
          <Frame src="../preview/type.html" w={700} h={360} />
        </DCArtboard>
        <DCArtboard id="spacing" label="Spacing · radii · shadows" width={700} height={280}>
          <Frame src="../preview/spacing.html" w={700} h={280} />
        </DCArtboard>
      </DCSection>

      <DCSection id="components" title="02 · Components" subtitle="Closed inventory of building blocks. Anything new is a remix of these.">
        <DCArtboard id="chips" label="Status chips · lifecycle, SLA, counters" width={700} height={230}>
          <Frame src="../preview/chips.html" w={700} h={230} />
        </DCArtboard>
        <DCArtboard id="buttons" label="Buttons · primary, secondary, ghost, danger" width={700} height={250}>
          <Frame src="../preview/buttons.html" w={700} h={250} />
        </DCArtboard>
        <DCArtboard id="forms" label="Form controls · inputs, select, toggle" width={700} height={320}>
          <Frame src="../preview/forms.html" w={700} h={320} />
        </DCArtboard>
        <DCArtboard id="row" label="Table row · request line anatomy" width={700} height={220}>
          <Frame src="../preview/table-row.html" w={700} h={220} />
        </DCArtboard>
        <DCArtboard id="kpi" label="KPI metric card" width={700} height={140}>
          <Frame src="../preview/kpi.html" w={700} h={140} />
        </DCArtboard>
        <DCArtboard id="email" label="Email thread item · in/out + detector" width={700} height={380}>
          <Frame src="../preview/email-thread.html" w={700} h={380} />
        </DCArtboard>
      </DCSection>

      <DCSection id="screens" title="03 · Screens" subtitle="Full-fidelity recreations of the core surfaces. Use these as the starting point when you design a new screen.">
        <DCArtboard id="pool" label="Manager pool · main work surface (1440 × 900)" width={1440} height={900}>
          <Frame src="crm/01-pool.html" w={1440} h={900} />
        </DCArtboard>
        <DCArtboard id="dashboard" label="Dashboard · РОП · 7-day system state (1440 × 1100)" width={1440} height={1100}>
          <Frame src="crm/02-dashboard.html" w={1440} h={1100} />
        </DCArtboard>
        <DCArtboard id="requests" label="Все открытые заявки · группировка + bulk (1440 × 1000)" width={1440} height={1000}>
          <Frame src="crm/03-requests.html" w={1440} h={1000} />
        </DCArtboard>
        <DCArtboard id="detail" label="Карточка заявки MZ-21384 (1440 × 1400)" width={1440} height={1400}>
          <Frame src="crm/04-request-detail.html" w={1440} h={1400} />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
