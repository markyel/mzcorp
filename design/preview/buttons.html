<!doctype html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:var(--bg-surface);font-family:var(--font-sans);font-size:12px;color:var(--fg-1)}
.label{font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin:0 0 8px}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
.btn{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 12px;border-radius:var(--r-md);font:500 13px/1 var(--font-sans);border:1px solid var(--border-strong);background:var(--bg-surface);color:var(--fg-1);cursor:pointer;transition:120ms var(--ease)}
.btn:hover{background:var(--bg-hover)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent-600);border-color:var(--accent-600)}
.btn.ghost{border-color:transparent;background:transparent;color:var(--fg-2)}
.btn.ghost:hover{background:var(--bg-hover)}
.btn.danger{background:transparent;color:var(--accent);border-color:var(--red-300)}
.btn.sm{height:24px;font-size:12px;padding:0 8px}
.btn.lg{height:36px;font-size:13px;padding:0 16px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.icon{width:14px;height:14px;display:inline-block;border:1.5px solid currentColor;border-radius:3px;position:relative}
.icon::before{content:"";position:absolute;inset:2px;border-top:1.5px solid currentColor;border-right:1.5px solid currentColor;transform:rotate(45deg);transform-origin:60% 40%}
</style></head><body>
<div class="label">Primary / Secondary / Ghost / Danger</div>
<div class="row">
  <button class="btn primary"><span class="icon"></span>Назначить</button>
  <button class="btn">Отменить</button>
  <button class="btn ghost">Подробнее</button>
  <button class="btn danger">Закрыть как lost</button>
  <button class="btn primary" disabled>Disabled</button>
</div>
<div class="label">Sizes — sm / md / lg</div>
<div class="row">
  <button class="btn sm primary">+ Заявка</button>
  <button class="btn primary">Запросить refresh</button>
  <button class="btn lg primary">Перейти к карточке</button>
</div>
<div class="label">Toolbar / icon-only · table-row actions</div>
<div class="row">
  <button class="btn sm">Фильтр</button>
  <button class="btn sm">Сортировка ↓</button>
  <button class="btn sm ghost">⌘K · поиск</button>
  <span style="flex:1"></span>
  <button class="btn sm ghost" aria-label="более">···</button>
</div>
</body></html>
