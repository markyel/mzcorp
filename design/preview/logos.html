<!doctype html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg-surface);font-family:var(--font-sans);color:var(--fg-1);display:flex;flex-direction:column;gap:18px}
.row{display:flex;align-items:center;gap:24px;padding:12px 16px;border:1px solid var(--border);border-radius:var(--r-md)}
.row.dark{background:var(--neutral-900);color:#fff;border-color:var(--neutral-900)}
.lbl{font:600 10.5px/1 var(--font-sans);color:var(--fg-3);text-transform:uppercase;letter-spacing:.05em;width:120px}
.row.dark .lbl{color:var(--neutral-400)}
img{height:32px}
.row.dark img{filter:brightness(0) invert(1)}
</style></head><body>
<div class="row"><span class="lbl">CRM topbar</span><img src="../assets/logos/mylift-wordmark.svg"></div>
<div class="row"><span class="lbl">Login / footer</span><img src="../assets/logos/myzip-corporate.svg" style="height:40px"></div>
<div class="row dark"><span class="lbl">On dark</span><img src="../assets/logos/mylift-wordmark.svg"></div>
</body></html>
