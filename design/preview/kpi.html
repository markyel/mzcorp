<!doctype html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:var(--bg-app);font-family:var(--font-sans);color:var(--fg-1)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.c{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px}
.c .k{font:600 10.5px/1 var(--font-sans);color:var(--fg-3);text-transform:uppercase;letter-spacing:.04em}
.c .v{font:600 28px/1.1 var(--font-sans);color:var(--fg-1);margin-top:8px;font-feature-settings:'tnum';letter-spacing:-0.02em}
.c .v small{font-weight:500;font-size:14px;color:var(--fg-3);margin-left:4px}
.c .d{font:500 11.5px/1.3 var(--font-sans);margin-top:6px;display:flex;gap:6px;align-items:center}
.up{color:var(--emerald-700)}.down{color:var(--red-700)}.flat{color:var(--fg-3)}
.bar{height:3px;background:var(--neutral-100);border-radius:999px;margin-top:10px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--accent)}
</style></head><body>
<div class="grid">
  <div class="c"><div class="k">Заявок в работе</div><div class="v">147</div><div class="d up">↗ +12 за неделю</div></div>
  <div class="c"><div class="k">Средний time-to-quote</div><div class="v">3,4<small>ч</small></div><div class="d up">↘ −0,8 ч</div></div>
  <div class="c"><div class="k">Просрочено по SLA</div><div class="v" style="color:var(--red-700)">8</div><div class="d down">↗ +3 сегодня</div></div>
  <div class="c"><div class="k">Конверсия КП → счёт</div><div class="v">42<small>%</small></div><div class="bar"><i style="width:42%"></i></div></div>
</div>
</body></html>
