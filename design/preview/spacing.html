<!doctype html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:var(--bg-surface);font-family:var(--font-sans);color:var(--fg-1);font-size:12px}
.label{font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin:0 0 8px}
.scale{display:flex;align-items:flex-end;gap:8px;margin-bottom:18px}
.t{display:flex;flex-direction:column;align-items:center;gap:4px}
.t .b{background:var(--red-100);border:1px solid var(--red-300);border-radius:2px}
.t .n{font:600 11px/1 var(--font-mono);color:var(--fg-2)}
.t .v{font-size:10px;color:var(--fg-3)}
.radii{display:flex;gap:14px;margin-bottom:18px}
.r{display:flex;flex-direction:column;align-items:center;gap:6px}
.r .box{width:48px;height:48px;background:var(--neutral-200);border:1px solid var(--border-strong)}
.r .lbl{font:500 11px/1.2 var(--font-sans);color:var(--fg-2);text-align:center}
.r .v{font:500 10px/1 var(--font-mono);color:var(--fg-3)}
.shadows{display:flex;gap:14px}
.sh{flex:1;height:48px;background:var(--bg-surface);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font:500 11px/1 var(--font-sans);color:var(--fg-2)}
</style></head><body>
<div class="label">Spacing scale (4px base)</div>
<div class="scale">
  <div class="t"><div class="b" style="width:4px;height:4px"></div><div class="n">s-1</div><div class="v">4</div></div>
  <div class="t"><div class="b" style="width:8px;height:8px"></div><div class="n">s-2</div><div class="v">8</div></div>
  <div class="t"><div class="b" style="width:12px;height:12px"></div><div class="n">s-3</div><div class="v">12</div></div>
  <div class="t"><div class="b" style="width:16px;height:16px"></div><div class="n">s-4</div><div class="v">16</div></div>
  <div class="t"><div class="b" style="width:24px;height:24px"></div><div class="n">s-5</div><div class="v">24</div></div>
  <div class="t"><div class="b" style="width:32px;height:32px"></div><div class="n">s-6</div><div class="v">32</div></div>
  <div class="t"><div class="b" style="width:48px;height:48px"></div><div class="n">s-7</div><div class="v">48</div></div>
  <div class="t"><div class="b" style="width:64px;height:64px"></div><div class="n">s-8</div><div class="v">64</div></div>
</div>
<div class="label">Radii</div>
<div class="radii">
  <div class="r"><div class="box" style="border-radius:4px"></div><div class="lbl">sm</div><div class="v">4</div></div>
  <div class="r"><div class="box" style="border-radius:6px"></div><div class="lbl">md · default</div><div class="v">6</div></div>
  <div class="r"><div class="box" style="border-radius:8px"></div><div class="lbl">lg · modal</div><div class="v">8</div></div>
  <div class="r"><div class="box" style="border-radius:999px;width:80px"></div><div class="lbl">pill · chip</div><div class="v">∞</div></div>
</div>
<div class="label">Shadows</div>
<div class="shadows">
  <div class="sh" style="box-shadow:var(--shadow-sm);border:1px solid var(--border)">sm · hover</div>
  <div class="sh" style="box-shadow:var(--shadow-md)">md · menu</div>
  <div class="sh" style="box-shadow:var(--shadow-lg)">lg · modal</div>
</div>
</body></html>
