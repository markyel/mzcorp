<!doctype html><html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:var(--bg-surface);font-family:var(--font-sans);font-size:12px;color:var(--fg-1)}
.row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.label{font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin:0 0 8px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:var(--r-pill);font-weight:500;font-size:11.5px;line-height:1.4;border:1px solid transparent}
.chip .dot{width:6px;height:6px;border-radius:999px;background:currentColor;flex-shrink:0}
.chip.neutral{background:var(--status-neutral-bg);color:var(--status-neutral-fg);border-color:var(--neutral-200)}
.chip.info{background:var(--status-info-bg);color:var(--status-info-fg)}
.chip.attn{background:var(--status-attn-bg);color:var(--status-attn-fg)}
.chip.over{background:var(--status-overdue-bg);color:var(--status-overdue-fg)}
.chip.ok{background:var(--status-ok-bg);color:var(--status-ok-fg)}
.chip.paused{background:var(--status-paused-bg);color:var(--status-paused-fg)}
.chip.solid{background:var(--accent);color:#fff;border-color:var(--accent)}
</style></head><body>
<div class="label">Жизненный цикл заявки</div>
<div class="row">
  <span class="chip neutral"><span class="dot"></span>получено</span>
  <span class="chip info"><span class="dot"></span>на квалификации</span>
  <span class="chip info"><span class="dot"></span>в работе</span>
  <span class="chip attn"><span class="dot"></span>ждём клиента</span>
  <span class="chip attn"><span class="dot"></span>refresh цен</span>
  <span class="chip info"><span class="dot"></span>КП отправлено</span>
  <span class="chip info"><span class="dot"></span>счёт выставлен</span>
  <span class="chip ok"><span class="dot"></span>оплачено</span>
  <span class="chip neutral"><span class="dot"></span>закрыто (не наша тема)</span>
</div>
<div class="label">SLA / Attention</div>
<div class="row">
  <span class="chip over"><span class="dot"></span>просрочено · 2 ч 14 мин</span>
  <span class="chip attn"><span class="dot"></span>внимание сегодня</span>
  <span class="chip paused"><span class="dot"></span>пауза до 15.01</span>
  <span class="chip ok"><span class="dot"></span>в норме</span>
</div>
<div class="label">Счётчики и метки</div>
<div class="row">
  <span class="chip solid">12</span>
  <span class="chip neutral">5/8 позиций</span>
  <span class="chip info">AI · 0.94</span>
  <span class="chip ok">актуальная цена</span>
  <span class="chip over">stale · 14 дн</span>
</div>
</body></html>
