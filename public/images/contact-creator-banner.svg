<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Связь с создателем">
  <defs>
    <linearGradient id="ccBannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FEF2F3"/>
      <stop offset="100%" stop-color="#FDE8EA"/>
    </linearGradient>
    <linearGradient id="ccBannerSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.0"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- Фон -->
  <rect width="640" height="200" fill="url(#ccBannerBg)"/>
  <!-- Косая полоса блика -->
  <polygon points="380,0 540,0 250,200 90,200" fill="url(#ccBannerSheen)"/>

  <!-- Декоративные «+» в стиле макета (брендовый красный, низкая opacity) -->
  <g stroke="#D32027" stroke-width="2.5" stroke-linecap="round" opacity="0.42">
    <line x1="320" y1="48"  x2="332" y2="48"/>
    <line x1="326" y1="42"  x2="326" y2="54"/>
  </g>
  <g stroke="#D32027" stroke-width="2.5" stroke-linecap="round" opacity="0.32">
    <line x1="600" y1="168" x2="614" y2="168"/>
    <line x1="607" y1="161" x2="607" y2="175"/>
  </g>
  <g stroke="#D32027" stroke-width="2.5" stroke-linecap="round" opacity="0.28">
    <line x1="412" y1="160" x2="422" y2="160"/>
    <line x1="417" y1="155" x2="417" y2="165"/>
  </g>

  <!-- Лучи вокруг большой иконки -->
  <g stroke="#D32027" stroke-width="3" stroke-linecap="round" opacity="0.55">
    <line x1="530" y1="20"  x2="530" y2="36"/>
    <line x1="498" y1="28"  x2="506" y2="40"/>
    <line x1="562" y1="28"  x2="554" y2="40"/>
    <line x1="478" y1="58"  x2="492" y2="62"/>
    <line x1="582" y1="58"  x2="568" y2="62"/>
  </g>

  <!-- Большая иконка справа: треугольник с глазом -->
  <g transform="translate(440 50)"
     fill="none" stroke="#D32027" stroke-width="5"
     stroke-linejoin="round" stroke-linecap="round">
    <!-- Треугольник -->
    <path d="M90 5 L175 145 L5 145 Z"/>
    <!-- Полоса под глазом -->
    <line x1="22" y1="120" x2="158" y2="120"/>
    <!-- Миндаль -->
    <path d="M30 78 C 55 56, 125 56, 150 78 C 125 100, 55 100, 30 78 Z"/>
    <!-- Зрачок -->
    <circle cx="90" cy="78" r="11" fill="#D32027" stroke="none"/>
  </g>
</svg>
